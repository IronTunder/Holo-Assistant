
  <!DOCTYPE html>
  <html lang="it">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <link rel="icon" type="image/png" href="/holo-mark.png" />
      <link id="legacy-css" rel="stylesheet" href="/legacy.css" />
      <script>
        var OPERATOR_DISPLAY_PREFERENCES_KEY = "holo-assistant.operator-display-preferences";

        function supportsCssLayers() {
          var testId = "holo-assistant-css-layer-test";
          var style = document.createElement("style");
          var testElement = document.createElement("div");

          style.textContent =
            "@layer " + testId + " { #" + testId + " { color: rgb(1, 2, 3); } }";
          testElement.id = testId;
          document.head.appendChild(style);
          document.documentElement.appendChild(testElement);

          var color = window.getComputedStyle(testElement).color;
          style.parentNode.removeChild(style);
          testElement.parentNode.removeChild(testElement);

          return color === "rgb(1, 2, 3)";
        }

        function shouldForceLegacyGraphics() {
          try {
            var rawPreferences = window.localStorage.getItem(OPERATOR_DISPLAY_PREFERENCES_KEY);
            if (!rawPreferences) {
              return false;
            }

            var parsedPreferences = JSON.parse(rawPreferences);
            return Boolean(parsedPreferences && parsedPreferences.forceLegacyGraphics);
          } catch (_error) {
            return false;
          }
        }

        if (supportsCssLayers() && !shouldForceLegacyGraphics()) {
          var legacyCss = document.getElementById("legacy-css");
          if (legacyCss) {
            legacyCss.disabled = true;
          }
        }
      </script>
      <title>Holo-Assistant</title>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
