services:
  postgres:
    image: postgres:16
    container_name: ditto_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?Set DATABASE_PASSWORD in your environment}
      POSTGRES_DB: ditto_db
      TZ: Europe/Rome
      PGTZ: Europe/Rome
    ports:
      - "${DITTO_POSTGRES_PORT_MAPPING:-127.0.0.1:5432:5432}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ditto_network
    command: postgres -c listen_addresses='*'

  adminer:
    image: adminer
    container_name: ditto_adminer
    ports:
      - "${DITTO_ADMINER_PORT_MAPPING:-127.0.0.1:8080:8080}"
    networks:
      - ditto_network

volumes:
  postgres_data:

networks:
  ditto_network:
    driver: bridge
