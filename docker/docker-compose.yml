services:
  postgres:
    image: postgres:16
    container_name: ditto_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ditto_db
      TZ: Europe/Rome
      PGTZ: Europe/Rome
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ditto_network
    command: postgres -c listen_addresses='*'

  adminer:
    image: adminer
    container_name: ditto_adminer
    ports:
      - "8080:8080"
    networks:
      - ditto_network

  ollama:
    image: ollama/ollama:latest
    container_name: ditto_ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - TZ=Europe/Rome
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ditto_network

volumes:
  postgres_data:
  ollama_data:

networks:
  ditto_network:
    driver: bridge
